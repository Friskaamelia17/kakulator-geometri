<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Baris & Deret Geometri</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧮 Kalkulator Baris & Deret Geometri</h1>
            <p>Hitung dengan mudah dan akurat!</p>
        </header>

        <div class="calculator-tabs">
            <button class="tab-btn active" onclick="switchTab('baris')">📊 Baris Geometri</button>
            <button class="tab-btn" onclick="switchTab('deret')">📈 Deret Geometri</button>
        </div>

        <!-- TAB BARIS GEOMETRI -->
        <div id="baris-tab" class="tab-content active">
            <div class="input-group">
                <label>Suku Pertama (a):</label>
                <input type="number" id="suku1" placeholder="Contoh: 2" step="0.01">
            </div>
            <div class="input-group">
                <label>Rasio (r):</label>
                <input type="number" id="rasio" placeholder="Contoh: 3" step="0.01">
            </div>
            <div class="input-group">
                <label>Suku ke-n (n):</label>
                <input type="number" id="n" placeholder="Contoh: 5">
            </div>
            <button class="calc-btn" onclick="hitungBaris()">Hitung Suku ke-n → Un</button>
        </div>

        <!-- TAB DERET GEOMETRI -->
        <div id="deret-tab" class="tab-content">
            <div class="input-group">
                <label>Suku Pertama (a):</label>
                <input type="number" id="deret_a" placeholder="Contoh: 2" step="0.01">
            </div>
            <div class="input-group">
                <label>Rasio (r):</label>
                <input type="number" id="deret_r" placeholder="Contoh: 3" step="0.01">
            </div>
            <div class="input-group">
                <label>Jumlah Suku (n):</label>
                <input type="number" id="deret_n" placeholder="Contoh: 5">
            </div>
            <button class="calc-btn" onclick="hitungDeret()">Hitung Jumlah → Sn</button>
        </div>

        <!-- HASIL -->
        <div id="hasil" class="hasil"></div>

        <div class="contoh">
            <h3>💡 Contoh Perhitungan:</h3>
            <div class="contoh-grid">
                <div>
                    <strong>Baris:</strong> a=2, r=3, n=5<br>
                    Un = 2 × 3⁴ = <strong>162</strong>
                </div>
                <div>
                    <strong>Deret:</strong> a=2, r=3, n=5<br>
                    Sn = 2 × (3⁵-1)/(3-1) = <strong>242</strong>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
